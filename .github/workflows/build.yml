name: Build iOS MCP (LUA)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      scheme:
        description: 'Package scheme'
        required: false
        type: choice
        default: 'rootless'
        options:
          - rootless
          - rootful
          - roothide

jobs:
  build:
    name: Build (${{ matrix.scheme }})
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        scheme: [rootless, rootful, roothide]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Theos
        run: |
          export THEOS=$HOME/theos
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          if [ ! -d "$THEOS" ]; then
            echo "::group::Cloning Theos"
            git clone --depth 1 https://github.com/theos/theos.git "$THEOS" --quiet
            echo "::endgroup::"
          fi

          # Set up iOS SDK for Theos
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path 2>/dev/null)
          if [ -n "$SDK_PATH" ]; then
            mkdir -p "$THEOS/sdks"
            ln -sf "$SDK_PATH" "$THEOS/sdks/iPhoneOS.sdk"
            echo "Linked SDK: $SDK_PATH -> $THEOS/sdks/iPhoneOS.sdk"
          else
            echo "WARNING: No iOS SDK found via xcrun"
          fi

          # Ensure theos scripts are executable
          chmod +x "$THEOS/bin/"* 2>/dev/null || true
          echo "Theos installed at $THEOS"
          ls "$THEOS/bin/" | head -10
          echo "Theos SDKs:"
          ls -la "$THEOS/sdks/" 2>/dev/null || echo "(empty)"

      - name: Build (${{ matrix.scheme }})
        id: build
        run: |
          export THEOS=$HOME/theos

          # Rootful requires empty/unset THEOS_PACKAGE_SCHEME (not "rootful")
          if [ "${{ matrix.scheme }}" = "rootful" ]; then
            unset THEOS_PACKAGE_SCHEME
            echo "=== Building with scheme: rootful (default) ==="
          elif [ "${{ matrix.scheme }}" = "roothide" ]; then
            export THEOS_PACKAGE_SCHEME=roothide
            echo "=== Building with scheme: roothide ==="
          else
            export THEOS_PACKAGE_SCHEME=rootless
            echo "=== Building with scheme: rootless ==="
          fi

          echo "THEOS=$THEOS"
          echo "SDK=$(xcrun --sdk iphoneos --show-sdk-path 2>/dev/null || echo NOT-FOUND)"
          echo "Xcode=$(xcodebuild -version 2>/dev/null | head -1 || echo NOT-FOUND)"
          echo "PWD=$(pwd)"
          echo "Make=$(make --version 2>/dev/null | head -1)"

          # Dry-run to check Makefile can be parsed
          echo "=== Dry-run ==="
          make -n package FINALPACKAGE=1 2>&1 | tail -20

          # Clean
          make clean 2>/dev/null || true

          # Build with log capture
          echo "=== Building ==="
          make package FINALPACKAGE=1 > /tmp/build.log 2>&1; RC=$?
          tail -80 /tmp/build.log
          echo "=== Build exit code: $RC ==="
          exit $RC

      - name: Upload build log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ matrix.scheme }}
          path: /tmp/build.log
          retention-days: 7

      - name: Verify artifacts
        run: |
          echo "=== Built packages ==="
          find packages -type f -name "*.deb" -exec ls -lh {} \; 2>/dev/null || echo "No .deb found in packages/"
          find . -type f -name "*.deb" -exec ls -lh {} \; 2>/dev/null || echo "No .deb found anywhere"

      - name: Upload artifact (${{ matrix.scheme }})
        uses: actions/upload-artifact@v4
        with:
          name: ios-mcp-lua-${{ matrix.scheme }}
          path: |
            packages/*.deb
            *.deb
          if-no-files-found: warn
          retention-days: 90

  # Single combined artifact for easy download
  release:
    name: Bundle All Artifacts
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: List artifacts
        run: |
          echo "=== All built packages ==="
          find all-artifacts -type f -name "*.deb" -exec ls -lh {} \;

      - name: Upload combined bundle
        uses: actions/upload-artifact@v4
        with:
          name: ios-mcp-lua-all-packages
          path: all-artifacts/
          retention-days: 90
