name: Build iOS MCP (LUA)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      scheme:
        description: 'Package scheme'
        required: false
        type: choice
        default: 'rootless'
        options:
          - rootless
          - rootful
          - roothide

jobs:
  build:
    name: Build (${{ matrix.scheme }})
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        scheme: [rootless, rootful, roothide]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Theos
        run: |
          export THEOS=$HOME/theos
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          if [ ! -d "$THEOS" ]; then
            echo "::group::Cloning Theos"
            git clone --depth 1 https://github.com/theos/theos.git "$THEOS" --quiet
            echo "::endgroup::"
          fi
          # Ensure theos scripts are executable
          chmod +x "$THEOS/bin/"* 2>/dev/null || true
          echo "Theos installed at $THEOS"
          ls "$THEOS/bin/" | head -10

      - name: Build (${{ matrix.scheme }})
        run: |
          export THEOS=$HOME/theos
          export THEOS_PACKAGE_SCHEME=${{ matrix.scheme }}
          export FINALPACKAGE=1

          echo "=== Building with scheme: $THEOS_PACKAGE_SCHEME ==="
          echo "=== THEOS: $THEOS ==="
          
          # Clean first to ensure fresh build
          make clean 2>/dev/null || true
          
          # Build
          make package FINALPACKAGE=1 2>&1

      - name: Verify artifacts
        run: |
          echo "=== Built packages ==="
          find packages -type f -name "*.deb" -exec ls -lh {} \; 2>/dev/null || echo "No .deb found in packages/"
          find . -type f -name "*.deb" -exec ls -lh {} \; 2>/dev/null || echo "No .deb found anywhere"

      - name: Upload artifact (${{ matrix.scheme }})
        uses: actions/upload-artifact@v4
        with:
          name: ios-mcp-lua-${{ matrix.scheme }}
          path: |
            packages/*.deb
            *.deb
          if-no-files-found: warn
          retention-days: 90

  # Single combined artifact for easy download
  release:
    name: Bundle All Artifacts
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: List artifacts
        run: |
          echo "=== All built packages ==="
          find all-artifacts -type f -name "*.deb" -exec ls -lh {} \;

      - name: Upload combined bundle
        uses: actions/upload-artifact@v4
        with:
          name: ios-mcp-lua-all-packages
          path: all-artifacts/
          retention-days: 90
