name: Build iOS MCP (LUA)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      scheme:
        description: 'Package scheme'
        required: false
        type: choice
        default: 'rootless'
        options:
          - rootless
          - rootful
          - roothide

jobs:
  build:
    name: Build (${{ matrix.scheme }})
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        scheme: [rootless, rootful, roothide]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Theos
        run: |
          export THEOS=$HOME/theos
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          if [ ! -d "$THEOS" ]; then
            echo "::group::Cloning Theos"
            git clone --depth 1 https://github.com/theos/theos.git "$THEOS" --quiet
            echo "::endgroup::"
          fi
          # Ensure theos scripts are executable
          chmod +x "$THEOS/bin/"* 2>/dev/null || true
          echo "Theos installed at $THEOS"
          ls "$THEOS/bin/" | head -10

      - name: Build (${{ matrix.scheme }})
        id: build
        run: |
          export THEOS=$HOME/theos

          # Rootful requires empty/unset THEOS_PACKAGE_SCHEME (not "rootful")
          if [ "${{ matrix.scheme }}" = "rootful" ]; then
            unset THEOS_PACKAGE_SCHEME
            echo "=== Building with scheme: rootful (default) ==="
          elif [ "${{ matrix.scheme }}" = "roothide" ]; then
            export THEOS_PACKAGE_SCHEME=roothide
            echo "=== Building with scheme: roothide ==="
          else
            export THEOS_PACKAGE_SCHEME=rootless
            echo "=== Building with scheme: rootless ==="
          fi

          echo "=== THEOS: $THEOS ==="
          echo "=== Xcode: $(xcodebuild -version 2>/dev/null | head -1 || echo 'none') ==="
          echo "=== SDK: $(xcrun --sdk iphoneos --show-sdk-path 2>/dev/null || echo 'none') ==="
          ls "$THEOS/sdks/" 2>/dev/null || echo "(no manual SDKs)"
          echo "=== PWD: $(pwd) ==="
          echo "=== Files: $(ls *.m *.x 2>/dev/null | wc -l) .m/.x files ==="
          ls third_party/lua/lua-5.4.7/src/*.c 2>/dev/null | wc -l | xargs echo "Lua .c files:"

          # Test toolchain
          echo "=== Toolchain test ==="
          SDK=$(xcrun --sdk iphoneos --show-sdk-path 2>/dev/null)
          if [ -n "$SDK" ]; then
            printf 'int main(){return 0;}\n' | clang -x c - -arch arm64 -isysroot "$SDK" -miphoneos-version-min=13.0 -o /tmp/test_build 2>&1 && echo "C toolchain: OK" || echo "C toolchain: FAIL"
            printf '#import <Foundation/Foundation.h>\nint main(){return 0;}\n' | clang -x objective-c - -fobjc-arc -arch arm64 -isysroot "$SDK" -miphoneos-version-min=13.0 -framework Foundation -o /tmp/test_objc 2>&1 && echo "ObjC toolchain: OK" || echo "ObjC toolchain: FAIL"
            printf '#include "lua.h"\nint main(){return 0;}\n' | clang -x c - -arch arm64 -isysroot "$SDK" -miphoneos-version-min=13.0 -Ithird_party/lua/lua-5.4.7/src -o /tmp/test_lua 2>&1 && echo "Lua header: OK" || echo "Lua header: FAIL"
          fi

          # Dry-run to check Makefile syntax
          echo "=== Makefile dry-run ==="
          make -n package FINALPACKAGE=1 2>&1 | head -50 || echo "Dry-run failed"

          # Clean
          make clean 2>/dev/null || true

          # Build (capture all output to log)
          echo "=== Building (full log) ==="
          make package FINALPACKAGE=1 > /tmp/build.log 2>&1; RC=$?
          cat /tmp/build.log
          echo "=== Build exit code: $RC ==="
          exit $RC

      - name: Upload build log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ matrix.scheme }}
          path: /tmp/build.log
          retention-days: 7

      - name: Verify artifacts
        run: |
          echo "=== Built packages ==="
          find packages -type f -name "*.deb" -exec ls -lh {} \; 2>/dev/null || echo "No .deb found in packages/"
          find . -type f -name "*.deb" -exec ls -lh {} \; 2>/dev/null || echo "No .deb found anywhere"

      - name: Upload artifact (${{ matrix.scheme }})
        uses: actions/upload-artifact@v4
        with:
          name: ios-mcp-lua-${{ matrix.scheme }}
          path: |
            packages/*.deb
            *.deb
          if-no-files-found: warn
          retention-days: 90

  # Single combined artifact for easy download
  release:
    name: Bundle All Artifacts
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: List artifacts
        run: |
          echo "=== All built packages ==="
          find all-artifacts -type f -name "*.deb" -exec ls -lh {} \;

      - name: Upload combined bundle
        uses: actions/upload-artifact@v4
        with:
          name: ios-mcp-lua-all-packages
          path: all-artifacts/
          retention-days: 90
